# .github/workflows/fabcore-dashboard.yml
# ─────────────────────────────────────────────────────────────────────────────
# Pipeline completo:
#   Google Sheets  ──gspread──►  metrics.json  ──►  GitHub Pages
#
# Triggers:
#   - Push a main (cualquier archivo)
#   - Cron diario a las 6:00 AM Lima (UTC-5 = 11:00 UTC)
#   - Manual desde Actions → "Run workflow"
#
# Secrets necesarios (Settings → Secrets → Actions):
#   GOOGLE_CREDENTIALS  →  contenido completo del JSON de service account
#
# Setup GitHub Pages:
#   Settings → Pages → Source: "GitHub Actions"
# ─────────────────────────────────────────────────────────────────────────────

name: Fabcore — Fetch & Deploy Dashboard

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 11 * * *"   # 6:00 AM Lima (UTC-5) todos los días
  workflow_dispatch:        # Ejecución manual desde GitHub Actions

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ── Job 1: Fetch desde Google Sheets y construir assets ─────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install gspread google-auth pandas openpyxl

      - name: Fetch data & compute metrics
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          # SPREADSHEET_ID se puede sobreescribir aquí si cambia el archivo:
          # SPREADSHEET_ID: "1fSygIV3AmxzHOil6b-PgZ5_LO73nyrM87YrtL02rRuo"
        run: python scripts/fabcore_fetch_and_build.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/
          
  # ── Job 2: Deploy a GitHub Pages ─────────────────────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
